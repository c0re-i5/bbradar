name: wordpress-audit
description: >
  WordPress-specific security audit workflow. Detects WordPress, enumerates
  plugins/themes/users, runs WPScan, and follows up with Nuclei WordPress
  templates and directory discovery.

steps:
  - name: Technology Detection (whatweb)
    command: "whatweb {{target}} --color=never -q --log-json=-"
    tool: whatweb
    data_type: tech
    parser: lines
    timeout: 120
    required: false

  - name: WordPress Scan (wpscan)
    command: "wpscan --url http://{{target}} --format json --no-banner --enumerate vp,vt,u1-20"
    tool: wpscan
    data_type: other
    parser: lines
    timeout: 900
    save_raw: true
    required: false

  - name: Nuclei WordPress Templates
    command: "echo {{target}} | nuclei -silent -tags wordpress -jsonl"
    tool: nuclei
    data_type: other
    parser: lines
    timeout: 900
    save_raw: true
    required: false

  - name: WordPress Directory Discovery
    command: "gobuster dir -u http://{{target}} -w /usr/share/wordlists/dirb/common.txt -q --no-progress"
    tool: gobuster
    data_type: endpoint
    parser: lines
    timeout: 600
    required: false

  - name: WordPress Admin Brute-Force Check
    command: "nikto -h {{target}} -Tuning 1 -Format txt -nointeractive"
    tool: nikto
    data_type: other
    parser: lines
    timeout: 600
    save_raw: true
    required: false
